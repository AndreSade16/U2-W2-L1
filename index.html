<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h2 class="text-center mt-5">Esercizio 1</h2>
    <div class="container text-center">
      <div class="row">
        <div class="col-md-4 bg-primary text-white border border-dark p-3">
          Col1
        </div>
        <div class="col-md-4 bg-primary text-white border border-dark p-3">
          Col2
        </div>
        <div class="col-md-4 bg-primary text-white border border-dark p-3">
          Col3
        </div>
      </div>
    </div>
    <h2 class="text-center mt-3">Esercizio 2</h2>
    <div class="container-fluid text-center">
      <div class="row">
        <div
          class="col-sm-12 col-md-4 bg-warning text-black border border-dark p-3"
        >
          Col1
        </div>
        <div
          class="col-sm-12 col-md-4 bg-warning text-black border border-dark p-3"
        >
          Col2
        </div>
        <div
          class="col-sm-12 col-md-4 bg-warning text-black border border-dark p-3"
        >
          Col3
        </div>
      </div>
    </div>
    <h2 class="text-center mt-3">Esercizio 3</h2>
    <div class="container-fluid">
      <div class="row">
        <div
          class="col-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col1
        </div>
        <div
          class="col-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col2
        </div>
        <div
          class="col-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col3
        </div>
      </div>
      <div class="row">
        <div
          class="col-sm-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col1
        </div>
        <div
          class="col-sm-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col2
        </div>
        <div
          class="col-sm-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col3
        </div>
      </div>
      <div class="row">
        <div
          class="col-md-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col1
        </div>
        <div
          class="col-md-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col2
        </div>
        <div
          class="col-md-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col3
        </div>
      </div>
      <div class="row">
        <div
          class="col-lg-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col1
        </div>
        <div
          class="col-lg-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col2
        </div>
        <div
          class="col-lg-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col3
        </div>
      </div>
      <div class="row">
        <div
          class="col-xl-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col1

        <div

          Col2

        <div

          Col3
        </div>
      </div>
      <div class="row">
        <div
          class="col-xxl-4 bg-success text-white border border-dark p-3 text-center"

          Col1

          Col2
        </div>
        <div
          class="col-xxl-4 bg-success text-white border border-dark p-3 text-center"
        >
          Col3
        </div>
      </div>
    </div>
    <h2 class="title text-center mt-3">Esercizio 4</h2>

    <div class="container-fluid">
      <div class="row">
        <div
          class="col-3 bg-danger p-3 border border-black text-center text-white"
        >
          Col 1
        </div>
        <div
          class="col-6 bg-danger p-3 border border-black text-center text-white"
        >
          Col 1
        </div>
        <div
          class="col-3 bg-danger p-3 border border-black text-center text-white"
        >
          Col 1
        </div>
      </div>
    </div>

    <h2 class="title text-center mt-3">Esercizio 5</h2>
    <div class="container-fluid">
      <div class="row">
        <div
          class="col-12 col-lg-7 bg-info p-3 border border-black text-center text-white"
        >
          <div class="row justify-content-center">
            <div
              class="col-md-6 col-12 bg-secondary p-3 border border-black text-center text-white"
            >
              Inside Col 1
            </div>
            <div
              class="col-md-6 col-12 bg-secondary p-3 border border-black text-center text-white"
            >
              Inside Col 2
            </div>
          </div>
        </div>
        <div
          class="col-12 col-lg-5 bg-info p-3 border border-black text-center text-white"
        ></div>
      </div>
    </div>

    <h2 class="text-center fw-bold">Esercizio 6</h2>
    <div class="container-fluid">
      <div class="row">
        <div
          class="col-lg-3 bg-dark p-3 border border-black text-center text-white"
        >
          Col 1
        </div>

        <div
          class="col-lg-3 bg-dark p-3 offset-lg-2 border border-black text-center text-white"
        >
          Col 2 Offset 2
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
